
<!DOCTYPE html>
<html lang="en">
<head>

<body style="font-family: Arial, sans-serif; text-align: center; background-color: #f0f0f0;">

    <h1>Instagram Downloader</h1>

    <input type="text" id="instaLink" placeholder="Paste Instagram Link Here" style="width: 80%; padding: 10px; margin: 15px 0; border-radius: 5px; border: 1px solid #ccc;">
    <br>
    <button onclick="downloadInsta()" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">Download Now</button>

    <script>
        function downloadInsta() {
            var link = document.getElementById('instaLink').value;
            if (link) {
                window.open('https://snapinsta.io/?url=' + encodeURIComponent(link), '_blank');
            } else {
                alert('Please paste an Instagram link!');
            }
        }
    </script>
